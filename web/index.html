<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniswap Bot 管理面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .status-running {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }
        .status-stopped {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.7);
        }
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .stat:last-child {
            border-bottom: none;
        }
        .stat-label {
            color: rgba(255,255,255,0.5);
        }
        .stat-value {
            font-weight: 600;
            color: #00d4ff;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            color: white;
        }
        .btn-success {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        .btn-danger {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            border: 1px solid #ff4757;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,212,255,0.3);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border: none;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }
        .result.success {
            display: block;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
        }
        .result.error {
            display: block;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid #ff4757;
            color: #ff4757;
        }
        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .nav-item {
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-item.active {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Uniswap Bot 管理面板</h1>
            <span id="botStatus" class="status-badge status-stopped">运行中</span>
        </header>

        <div class="nav">
            <div class="nav-item active" onclick="showPage('dashboard')">仪表盘</div>
            <div class="nav-item" onclick="showPage('operations')">操作</div>
            <div class="nav-item" onclick="showPage('settings')">设置</div>
        </div>

        <div id="dashboard" class="tab-content active">
            <div class="grid">
                <div class="card">
                    <h2>📊 状态概览</h2>
                    <div class="stat">
                        <span class="stat-label">运行状态</span>
                        <span class="stat-value" id="runningStatus">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">熔断保护</span>
                        <span class="stat-value" id="circuitBreaker">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">池地址</span>
                        <span class="stat-value" id="poolAddress" style="font-size: 12px;">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Token0</span>
                        <span class="stat-value" id="token0" style="font-size: 12px;">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Token1</span>
                        <span class="stat-value" id="token1" style="font-size: 12px;">-</span>
                    </div>
                </div>

                <div class="card">
                    <h2>💰 账户余额</h2>
                    <div class="stat">
                        <span class="stat-label">Token0 余额</span>
                        <span class="stat-value" id="token0Balance">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Token1 余额</span>
                        <span class="stat-value" id="token1Balance">-</span>
                    </div>
                </div>

                <div class="card">
                    <h2>⚙️ 控制面板</h2>
                    <button class="btn btn-success" onclick="startBot()">启动 Bot</button>
                    <button class="btn btn-danger" onclick="stopBot()">停止 Bot</button>
                    <button class="btn btn-primary" onclick="triggerRebalance()">立即调仓</button>
                </div>
            </div>
        </div>

        <div id="operations" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h2>🏊 创建交易对</h2>
                    <div class="form-group">
                        <label>Token0 地址</label>
                        <input type="text" id="createToken0" placeholder="0x..." value="0x948e15b38f096d3a664fdeef44c13709732b2110">
                    </div>
                    <div class="form-group">
                        <label>Token1 地址</label>
                        <input type="text" id="createToken1" placeholder="0x..." value="0x2d7efff683b0a21e0989729e0249c42cdf9ee442">
                    </div>
                    <div class="form-group">
                        <label>费率 (500 = 0.05%)</label>
                        <input type="number" id="createFee" placeholder="500" value="500">
                    </div>
                    <button class="btn btn-primary" onclick="createPool()">创建交易对</button>
                    <div id="createPoolResult" class="result"></div>
                </div>

                <div class="card">
                    <h2>💧 添加流动性</h2>
                    <div class="form-group">
                        <label>Token0 地址</label>
                        <input type="text" id="liquidityToken0" placeholder="0x..." value="0x948e15b38f096d3a664fdeef44c13709732b2110">
                    </div>
                    <div class="form-group">
                        <label>Token1 地址</label>
                        <input type="text" id="liquidityToken1" placeholder="0x..." value="0x2d7efff683b0a21e0989729e0249c42cdf9ee442">
                    </div>
                    <div class="form-group">
                        <label>Token0 数量 (wei)</label>
                        <input type="text" id="liquidityAmount0" placeholder="1000000000000000000" value="1000000000000000000">
                    </div>
                    <div class="form-group">
                        <label>Token1 数量 (wei)</label>
                        <input type="text" id="liquidityAmount1" placeholder="1000000000000000000" value="1000000000000000000">
                    </div>
                    <button class="btn btn-primary" onclick="addLiquidity()">添加流动性</button>
                    <div id="addLiquidityResult" class="result"></div>
                </div>

                <div class="card">
                    <h2>🔄 Swap 交易</h2>
                    <div class="form-group">
                        <label>输入 Token</label>
                        <input type="text" id="swapTokenIn" placeholder="0x..." value="0x948e15b38f096d3a664fdeef44c13709732b2110">
                    </div>
                    <div class="form-group">
                        <label>输出 Token</label>
                        <input type="text" id="swapTokenOut" placeholder="0x..." value="0x2d7efff683b0a21e0989729e0249c42cdf9ee442">
                    </div>
                    <div class="form-group">
                        <label>输入数量 (wei)</label>
                        <input type="text" id="swapAmountIn" placeholder="1000000000000000000" value="1000000000000000000">
                    </div>
                    <button class="btn btn-primary" onclick="executeSwap()">执行 Swap</button>
                    <div id="swapResult" class="result"></div>
                </div>
            </div>
        </div>

        <div id="settings" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h2>📝 配置信息</h2>
                    <div class="stat">
                        <span class="stat-label">Fee Tier</span>
                        <span class="stat-value" id="feeTier">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">总资产比例</span>
                        <span class="stat-value" id="totalRatio">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1';

        async function apiCall(endpoint, method = 'GET', body = null) {
            try {
                const options = {
                    method,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (body) {
                    options.body = JSON.stringify(body);
                }
                const response = await fetch(API_BASE + endpoint, options);
                return await response.json();
            } catch (error) {
                return { error: error.message };
            }
        }

        function showPage(page) {
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            event.target.classList.add('active');
            if (page === 'dashboard') loadDashboard();
        }

        async function loadDashboard() {
            const status = await apiCall('/status');
            const balance = await apiCall('/balance');

            document.getElementById('runningStatus').textContent = status.running ? '运行中' : '已停止';
            document.getElementById('runningStatus').style.color = status.running ? '#00ff88' : '#ff4757';
            document.getElementById('botStatus').textContent = status.running ? '运行中' : '已停止';
            document.getElementById('botStatus').className = 'status-badge ' + (status.running ? 'status-running' : 'status-stopped');
            
            document.getElementById('circuitBreaker').textContent = status.circuit_breaker ? '已触发' : '正常';
            document.getElementById('circuitBreaker').style.color = status.circuit_breaker ? '#ff4757' : '#00ff88';
            document.getElementById('poolAddress').textContent = status.pool_address || '-';
            document.getElementById('token0').textContent = status.token0 ? status.token0.substring(0, 10) + '...' : '-';
            document.getElementById('token1').textContent = status.token1 ? status.token1.substring(0, 10) + '...' : '-';
            
            document.getElementById('token0Balance').textContent = balance.token0_balance || '0';
            document.getElementById('token1Balance').textContent = balance.token1_balance || '0';
            
            document.getElementById('feeTier').textContent = status.fee_tier || '-';
            document.getElementById('totalRatio').textContent = (status.total_ratio || 0) + '%';
        }

        async function startBot() {
            const result = await apiCall('/start', 'POST');
            alert(result.message || JSON.stringify(result));
            loadDashboard();
        }

        async function stopBot() {
            const result = await apiCall('/stop', 'POST');
            alert(result.message || JSON.stringify(result));
            loadDashboard();
        }

        async function triggerRebalance() {
            const result = await apiCall('/rebalance', 'POST');
            alert(result.message || JSON.stringify(result));
        }

        async function createPool() {
            const body = {
                token0: document.getElementById('createToken0').value,
                token1: document.getElementById('createToken1').value,
                fee: parseInt(document.getElementById('createFee').value)
            };
            const result = await apiCall('/create-pool', 'POST', body);
            const resultDiv = document.getElementById('createPoolResult');
            resultDiv.className = 'result ' + (result.success ? 'success' : 'error');
            resultDiv.innerHTML = '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
        }

        async function addLiquidity() {
            const body = {
                token0: document.getElementById('liquidityToken0').value,
                token1: document.getElementById('liquidityToken1').value,
                amount0: document.getElementById('liquidityAmount0').value,
                amount1: document.getElementById('liquidityAmount1').value,
                fee: 500
            };
            const result = await apiCall('/add-liquidity', 'POST', body);
            const resultDiv = document.getElementById('addLiquidityResult');
            resultDiv.className = 'result ' + (result.success ? 'success' : 'error');
            resultDiv.innerHTML = '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
        }

        async function executeSwap() {
            const body = {
                token_in: document.getElementById('swapTokenIn').value,
                token_out: document.getElementById('swapTokenOut').value,
                amount_in: document.getElementById('swapAmountIn').value
            };
            const result = await apiCall('/swap', 'POST', body);
            const resultDiv = document.getElementById('swapResult');
            resultDiv.className = 'result ' + (result.success ? 'success' : 'error');
            resultDiv.innerHTML = '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
        }

        loadDashboard();
        setInterval(loadDashboard, 5000);
    </script>
</body>
</html>
